    <canvas style="z-index=-1;"></canvas>
    <main style="padding: .75em;">
        <div>
            <h3>
              Road animation
            </h3>
    </main>
    <script>
    let canvas = document.querySelector("canvas");
    let ctx = canvas.getContext("2d");
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    // ---- DATA ----
    let vect_horizontal_points = [];
    let number_of_lines = 100;
    let first_line_y_pos;
    
    // ---- INIT (C++ init) ----
    function init() {
      vect_horizontal_points = [];
      first_line_y_pos = height;
    
      let y_pos = first_line_y_pos;
    
      for (let i = 0; i < number_of_lines; i++) {
        vect_horizontal_points.push({ x: 0, y: y_pos });
        vect_horizontal_points.push({ x: width, y: y_pos });
    
        y_pos -= y_pos / 5;
      }
    }
    
    // ---- UPDATE (C++ update) ----
    function update() {
      if (first_line_y_pos >= height) {
        // shift_left by 2 (remove first line pair)
        vect_horizontal_points.splice(0, 2);
    
        // add new line at end
        vect_horizontal_points.push({ x: 0, y: height - 50 });
        vect_horizontal_points.push({ x: width, y: height - 50 });
    
        first_line_y_pos = vect_horizontal_points[0].y;
      }
    
      first_line_y_pos += (height / 256);
    
      let y_pos = first_line_y_pos;
    
      for (let i = 0; i < number_of_lines * 2;) {
        vect_horizontal_points[i++].y = y_pos;
        vect_horizontal_points[i++].y = y_pos;
    
        y_pos -= y_pos / (height / 256);
      }
    }
    
    // ---- DRAW (C++ draw) ----
    function draw() {
      // fade effect
      ctx.fillStyle = "rgba(0,0,0,0.1)";
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "rgb(128, 25, 128, 0.3)";
      ctx.lineWidth = 3;
    
      // horizontal lines
      for (let i = 0; i < number_of_lines * 2 - 1; i += 2) {
        let p1 = vect_horizontal_points[i];
        let p2 = vect_horizontal_points[i + 1];
    
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    
      // vanishing point ("god")
      let god = { x: width / 2, y: -height / 8.0};
    
      // vertical perspective lines
      for (let i = -32; i < 32; i += 1 / 4) {
        ctx.strokeStyle = "rgb(128, 25, 128, 0.1)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(width * i, height);
        ctx.lineTo(god.x, god.y);
        ctx.stroke();
      }
    
      update();
    }
    
    // ---- LOOP ----
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    
    // ---- START ----
    init();
    animate();
    </script>
